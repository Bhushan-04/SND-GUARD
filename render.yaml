services:
  - type: web
    name: snd-guard-api
    runtime: node
    buildCommand: npm install && npm run build -w @snd-guard/shared && npm run build -w @snd-guard/api
    startCommand: npm run start:api
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://snd-guard-web.vercel.app,http://localhost:3001
      - key: SUI_NETWORK
        value: testnet
      - key: SUI_PACKAGE_ID
        sync: false
      - key: SUI_SECRET_KEY
        sync: false
      - key: SUI_MNEMONIC
        sync: false
      - key: ADAPTER_MODE
        value: production
      - key: WALRUS_PUBLISHER_URL
        value: https://publisher.walrus-testnet.walrus.space
      - key: WALRUS_AGGREGATOR_URL
        value: https://aggregator.walrus-testnet.walrus.space
