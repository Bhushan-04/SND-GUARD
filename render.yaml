services:
  - type: web
    name: snd-guard-api
    runtime: node
    buildCommand: npm install && npm run build -w @snd-guard/shared && npm run build -w @snd-guard/api
    startCommand: npm run start:api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SUI_NETWORK
        value: testnet
      - key: SUI_PACKAGE_ID
        sync: false
      - key: ADAPTER_MODE
        value: local
