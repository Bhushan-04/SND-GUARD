services:
  postgres:
    image: postgres:16-alpine
    container_name: sndguard-postgres
    environment:
      POSTGRES_USER: sndguard
      POSTGRES_PASSWORD: sndguard
      POSTGRES_DB: sndguard
    ports:
      - "5432:5432"
    volumes:
      - sndguard_pg_data:/var/lib/postgresql/data

volumes:
  sndguard_pg_data:
